<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Tanzim Travels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    class="bg-gray-950 text-white h-screen flex items-center justify-center px-6"
  >
    <div
      class="max-w-md w-full bg-white/5 border border-white/10 p-10 rounded-3xl backdrop-blur-xl"
    >
      <div class="text-center mb-8">
        <a
          href="index.html"
          class="text-3xl font-bold tracking-tighter inline-flex items-center gap-2 mb-4"
        >
          <i class="fas fa-paper-plane text-blue-500"></i>
          TANZIM
        </a>
        <h2 class="text-xl text-gray-300">Login to your account</h2>
      </div>

      <form id="loginForm" class="space-y-6">
        <div>
          <label class="block text-sm font-semibold mb-2 ml-1">Full Name</label>
          <input
            type="text"
            id="loginName"
            placeholder="Tanzim Ahmed Utsho"
            class="w-full px-5 py-4 rounded-2xl bg-white/5 border border-white/10 focus:ring-2 focus:ring-blue-600 outline-none transition"
            required
          />
        </div>
        <div>
          <label class="block text-sm font-semibold mb-2 ml-1"
            >Email Address</label
          >
          <input
            type="email"
            placeholder="example@mail.com"
            class="w-full px-5 py-4 rounded-2xl bg-white/5 border border-white/10 focus:ring-2 focus:ring-blue-600 outline-none transition"
            required
          />
        </div>
        <div class="relative">
          <label class="block text-sm font-semibold mb-2 ml-1">Password</label>
          <input
            type="password"
            id="password"
            placeholder="••••••••"
            class="w-full px-5 py-4 rounded-2xl bg-white/5 border border-white/10 focus:ring-2 focus:ring-blue-600 outline-none transition"
            required
          />
          <button
            type="button"
            onclick="togglePassword()"
            class="absolute right-5 top-11 text-gray-400 hover:text-white transition"
          >
            <i id="eyeIcon" class="fas fa-eye"></i>
          </button>
        </div>
        <button
          type="submit"
          class="w-full bg-blue-600 text-white font-bold py-5 rounded-2xl hover:bg-blue-700 transition transform hover:scale-[1.01] shadow-xl shadow-blue-600/20"
        >
          Login Now
        </button>
      </form>

      <div class="mt-8 flex items-center gap-4 text-gray-500">
        <div class="h-px bg-white/10 flex-1"></div>
        <span class="text-xs uppercase">Or continue with</span>
        <div class="h-px bg-white/10 flex-1"></div>
      </div>

      <div class="mt-6 grid grid-cols-2 gap-4">
        <button
          class="flex items-center justify-center gap-2 py-3 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 transition"
        >
          <i class="fab fa-google text-red-500"></i> Google
        </button>
        <button
          class="flex items-center justify-center gap-2 py-3 bg-white/5 border border-white/10 rounded-2xl hover:bg-white/10 transition"
        >
          <i class="fab fa-apple"></i> Apple
        </button>
      </div>

      <p class="mt-8 text-center text-gray-500 text-sm">
        Don't have an account?
        <a href="#" class="text-blue-500 hover:underline">Sign up</a>
      </p>

      <div class="mt-6 text-center">
        <a
          href="index.html"
          class="text-gray-400 hover:text-white transition text-sm"
        >
          <i class="fas fa-arrow-left mr-2"></i> Back to Home
        </a>
      </div>
    </div>

    <script>
      function togglePassword() {
        const passInput = document.getElementById("password");
        const eyeIcon = document.getElementById("eyeIcon");
        if (passInput.type === "password") {
          passInput.type = "text";
          eyeIcon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          passInput.type = "password";
          eyeIcon.classList.replace("fa-eye-slash", "fa-eye");
        }
      }

      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          const name = document.getElementById("loginName").value;

          // Save user to localStorage
          localStorage.setItem("tanzimUser", name);

          alert("Login Successful! Welcome back, " + name);

          // Redirect back to air tickets page
          window.location.href = "air-tickets.html";
        });
    </script>
  </body>
</html>
